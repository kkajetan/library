{% extends "base.html" %}

{% block title %}Dodaj książkę{% endblock %}

{% block content %}
<h2 class="mb-4">Dodaj książkę</h2>

<form method="post" class="needs-validation" novalidate>
    <div class="mb-3">
        <label for="title" class="form-label">Tytuł</label>
        <input type="text" class="form-control" id="title" name="title" required>
    </div>

    <div class="mb-3">
        <label for="year" class="form-label">Rok wydania</label>
        <input type="number" class="form-control" id="year" name="year" required>
    </div>

    <div class="mb-3">
        <label for="author" class="form-label">Autor</label>
        <input type="text" class="form-control" id="author" name="author" required>
    </div>

    <div class="mb-3">
        <label for="isbn" class="form-label">ISBN</label>
        <input type="text" class="form-control" id="isbn" name="isbn" required>
    </div>

    <button type="submit" class="btn btn-primary">Dodaj książkę</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary ms-2">Wróć</a>
</form>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-danger mt-4" role="alert">
    <ul class="mb-0">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}
{% endwith %}
{% endblock %}
